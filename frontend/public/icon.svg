      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D9488;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Leaf shape -->
  <path d="M256 96 C256 96 160 140 148 228 C136 316 196 364 256 388 C316 364 376 316 364 228 C352 140 256 96 256 96Z" fill="white" opacity="0.15"/>

  <!-- Barcode scan lines -->
  <rect x="152" y="210" width="16" height="92" rx="4" fill="white"/>
  <rect x="178" y="210" width="8" height="92" rx="4" fill="white"/>
  <rect x="196" y="210" width="20" height="92" rx="4" fill="white"/>
  <rect x="226" y="210" width="10" height="92" rx="4" fill="white"/>
  <rect x="246" y="210" width="18" height="92" rx="4" fill="white"/>
  <rect x="274" y="210" width="8" height="92" rx="4" fill="white"/>
  <rect x="292" y="210" width="22" height="92" rx="4" fill="white"/>
  <rect x="324" y="210" width="10" height="92" rx="4" fill="white"/>
  <rect x="344" y="210" width="16" height="92" rx="4" fill="white"/>

  <!-- Scan line (animated look) -->
